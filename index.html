<script>

const STORAGE_KEY = 'escala_hcufpe';

const hoje = new Date().toISOString().split('T')[0];

document.getElementById('data').value = hoje;

atualizarDiaSemana();

function mostrarPainel(tipo){

  if(tipo === 'principal'){

    document.getElementById('painelPrincipal')
      .style.display = 'block';

    document.getElementById('painelMedico')
      .style.display = 'none';
  }

  if(tipo === 'medico'){

    document.getElementById('painelPrincipal')
      .style.display = 'none';

    document.getElementById('painelMedico')
      .style.display = 'block';
  }
}

function atualizarDiaSemana(){

  const input = document.getElementById('data').value;

  if(!input) return;

  const data = new Date(input + 'T00:00:00');

  const dias = [
    'Domingo',
    'Segunda-feira',
    'Terça-feira',
    'Quarta-feira',
    'Quinta-feira',
    'Sexta-feira',
    'Sábado'
  ];

  document.getElementById('diaSemana')
    .innerText = dias[data.getDay()];
}

function alterarDia(valor){

  const campo = document.getElementById('data');

  const data = new Date(campo.value + 'T00:00:00');

  data.setDate(data.getDate() + valor);

  campo.value = data.toISOString().split('T')[0];

  atualizarDiaSemana();
}

function obterDados(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function salvarLocal(dados){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
}

function salvarDados(){

  const data = document.getElementById('data').value;

  const checks = document.querySelectorAll(
    '#painelPrincipal input[type="checkbox"]:checked'
  );

  const procedimentos = [...checks]
    .map(c => c.value)
    .join(', ');

  const obs = document.getElementById('obs').value;

  if(!procedimentos){
    alert('Selecione ao menos um procedimento.');
    return;
  }

  const dados = obterDados();

  dados.unshift({
    data,
    procedimentos,
    observacao: obs
  });

  salvarLocal(dados);

  document.getElementById('status')
    .innerText = 'Dados salvos com sucesso.';

  document.getElementById('obs').value = '';

  document.querySelectorAll(
    '#painelPrincipal input[type="checkbox"]'
  ).forEach(c => c.checked = false);

  carregarTabela();
}

function carregarTabela(){

  const dados = obterDados()
    .sort((a,b)=> new Date(b.data) - new Date(a.data));

  const tabela = document.getElementById('tabela');

  tabela.innerHTML = '';

  dados.slice(0,30).forEach((item,index)=>{

    tabela.innerHTML += `
      <tr>
        <td>${item.data}</td>
        <td>${item.procedimentos}</td>
        <td>${item.observacao}</td>
        <td>
          <button onclick="editarRegistro(${index})">
          Editar
          </button>

          <button onclick="excluirRegistro(${index})">
          Excluir
          </button>
        </td>
      </tr>
    `;
  });
}

function editarRegistro(index){

  const dados = obterDados();

  const item = dados[index];

  document.getElementById('data').value = item.data;

  atualizarDiaSemana();

  document.querySelectorAll(
    '#painelPrincipal input[type="checkbox"]'
  ).forEach(c => {
    c.checked = item.procedimentos.includes(c.value);
  });

  document.getElementById('obs').value =
    item.observacao;

  dados.splice(index,1);

  salvarLocal(dados);

  carregarTabela();
}

function excluirRegistro(index){

  if(!confirm('Deseja excluir este registro?'))
    return;

  const dados = obterDados();

  dados.splice(index,1);

  salvarLocal(dados);

  carregarTabela();
}

function exportarBackup(){

  const dados = obterDados();

  const blob = new Blob([
    JSON.stringify(dados,null,2)
  ],{
    type:'application/json'
  });

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);

  link.download = 'backup_escala_hcufpe.json';

  link.click();
}

function importarBackup(event){

  const arquivo = event.target.files[0];

  if(!arquivo) return;

  const reader = new FileReader();

  reader.onload = function(e){

    const dados = JSON.parse(e.target.result);

    salvarLocal(dados);

    carregarTabela();

    alert('Backup restaurado.');
  }

  reader.readAsText(arquivo);
}

function exportarPDF(){
  window.print();
}

function abreviarNome(nome){

  const partes = nome.split(' ');

  if(partes.length <= 2)
    return nome;

  return partes[0] + ' ' +
    partes[partes.length - 1];
}

function gerarGrade(turno,containerId){

  let html = '<div class="table-wrap"><table>';

  html += '<tr><th>Setor</th>';

  diasSemana.forEach(dia=>{
    html += `<th>${dia}</th>`;
  });

  html += '</tr>';

  setores.forEach(setor=>{

    html += `<tr><td><b>${setor}</b></td>`;

    diasSemana.forEach(dia=>{

      const chave =
        `${turno}_${setor}_${dia}`;

      html += `
      <td>
        <div id="${chave}"></div>

        <button onclick="adicionarSelect('${chave}')">
        +
        </button>
      </td>
      `;
    });

    html += '</tr>';
  });

  html += '</table></div>';

  document.getElementById(containerId)
    .innerHTML = html;
}

function adicionarSelect(chave){

  const container =
    document.getElementById(chave);

  const div = document.createElement('div');

  div.style.marginBottom = '6px';

  const select = document.createElement('select');

  medicos.sort().forEach(medico=>{

    const option =
      document.createElement('option');

    option.value = medico;

    option.textContent =
      abreviarNome(medico);

    select.appendChild(option);
  });

  const remover =
    document.createElement('button');

  remover.innerText = 'X';

  remover.style.marginLeft = '5px';

  remover.onclick = ()=> div.remove();

  div.appendChild(select);

  div.appendChild(remover);

  container.appendChild(div);
}

function renderizarListaMedicos(){

  medicos.sort();

  document.getElementById(
    'contadorMedicos'
  ).innerText = medicos.length;

  const lista =
    document.getElementById('listaMedicos');

  lista.innerHTML = '';

  medicos.forEach((medico,index)=>{

    lista.innerHTML += `
    <div style="
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:8px;
      border-bottom:1px solid #ddd;
    ">
      <span>${medico}</span>

      <button onclick="removerMedico(${index})">
      Remover
      </button>
    </div>
    `;
  });
}

function adicionarMedico(){

  const input =
    document.getElementById('novoMedico');

  const nome = input.value.trim();

  if(!nome) return;

  medicos.push(nome);

  input.value = '';

  renderizarListaMedicos();
}

function removerMedico(index){

  if(!confirm('Deseja remover este médico?'))
    return;

  medicos.splice(index,1);

  renderizarListaMedicos();
}

gerarGrade('manha','grade-manha');

gerarGrade('tarde','grade-tarde');

renderizarListaMedicos();

carregarTabela();

</script>
