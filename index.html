<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala de Imagem — HC-UFPE</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:'DM Sans',sans-serif;
  background:#f5f7fb;
  margin:0;
  padding:0;
  color:#1e293b;
}

header{
  background:#1F4E79;
  color:white;
  padding:18px 24px;
  font-size:22px;
  font-weight:600;
}

.container{
  max-width:1100px;
  margin:30px auto;
  background:white;
  padding:25px;
  border-radius:14px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  color:#1F4E79;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.card{
  border:1px solid #dbe3ec;
  border-radius:12px;

  background:#fafcff;

.card h3{
  margin-top:0;

}

label{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

textarea{
  width:100%;
  min-height:90px;
  border:1px solid #dbe3ec;
  border-radius:10px;
  padding:12px;
  font-family:inherit;
}

input[type="date"]{
  padding:10px;
  border-radius:8px;
  border:1px solid #dbe3ec;
}

button{
  background:#1D9E75;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  font-size:15px;
  cursor:pointer;
  margin-top:20px;
  margin-right:10px;
}

  opacity:0.92;
}

  overflow:auto;
  margin-top:30px;
}

  width:100%;

}

  border:1px solid #dbe3ec;

}

  margin-top:15px;

</head>
<body>

<header>
Escala de Imagem — HC-UFPE
</header>

<div class="container">

<h2>Registro diário</h2>

<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px;">

<button type="button" onclick="alterarDia(-1)">◀</button>

<label>
Data:
<input type="date" id="data" onchange="atualizarDiaSemana()">
</label>

<button type="button" onclick="alterarDia(1)">▶</button>

<div id="diaSemana" style="font-weight:600;color:#1F4E79;"></div>

</div>

<div class="grid">

<div class="card">
<h3>Tomografia</h3>
<label><input type="checkbox" value="TC com contraste"> TC com contraste</label>
<label><input type="checkbox" value="TC sem contraste"> TC sem contraste</label>
</div>

<div class="card">
<h3>Ressonância</h3>
<label><input type="checkbox" value="Ressonância"> Ressonância</label>
</div>

<div class="card">
<h3>Radiografia</h3>
<label><input type="checkbox" value="Raios-X"> Raios-X</label>
</div>

<div class="card">
<h3>Ultrassonografia</h3>
<label><input type="checkbox" value="Ultrassonografia"> Ultrassonografia</label>
</div>

<div class="card">
<h3>Outros</h3>
<label><input type="checkbox" value="Mamografia"> Mamografia</label>
<label><input type="checkbox" value="Densitometria"> Densitometria</label>
<label><input type="checkbox" value="Bloco Cirúrgico"> Bloco Cirúrgico</label>
</div>

</div>

<h2 style="margin-top:30px;">Observações</h2>

<textarea id="obs" placeholder="Exemplo: manutenção RM, urgência mantida, exames suspensos..."></textarea>

<div class="actions">
<button onclick="salvarDados()">Salvar</button>
<button onclick="exportarPDF()">Exportar PDF</button>
<button onclick="exportarBackup()">Backup</button>
<input type="file" id="importar" style="display:none" onchange="importarBackup(event)">
<button onclick="document.getElementById('importar').click()">Restaurar Backup</button>
</div>

<div class="status" id="status"></div>

<div class="table-wrap">
<h2>Últimos registros</h2>
<table>
<thead>
<tr>
<th>Data</th>
<th>Procedimentos realizados</th>
<th>Observação</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

</div>

<script>

const STORAGE_KEY = 'escala_hcufpe';

const hoje = new Date().toISOString().split('T')[0];
document.getElementById('data').value = hoje;

atualizarDiaSemana();

function atualizarDiaSemana(){

  const input = document.getElementById('data').value;

  if(!input) return;

  const data = new Date(input + 'T00:00:00');

  const dias = [
    'Domingo',
    'Segunda-feira',
    'Terça-feira',
    'Quarta-feira',
    'Quinta-feira',
    'Sexta-feira',
    'Sábado'
  ];

  document.getElementById('diaSemana').innerText = dias[data.getDay()];
}

function alterarDia(valor){

  const campo = document.getElementById('data');

  const data = new Date(campo.value + 'T00:00:00');

  data.setDate(data.getDate() + valor);

  campo.value = data.toISOString().split('T')[0];

  atualizarDiaSemana();
}

function obterDados(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
}

function salvarLocal(dados){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(dados));
}

function salvarDados(){

  const data = document.getElementById('data').value;

  const checks = document.querySelectorAll('input[type="checkbox"]:checked');

  const procedimentos = [...checks].map(c => c.value).join(', ');

  const obs = document.getElementById('obs').value;

  if(!procedimentos){
    alert('Selecione ao menos um procedimento.');
    return;
  }

  const dados = obterDados();

  dados.unshift({
    data,
    procedimentos,
    observacao: obs
  });

  salvarLocal(dados);

  document.getElementById('status').innerText = 'Dados salvos com sucesso.';

  document.getElementById('obs').value = '';

  document.querySelectorAll('input[type="checkbox"]').forEach(c => {
    c.checked = false;
  });

  carregarTabela();
}

function carregarTabela(){

  const dados = obterDados()
.sort((a,b)=> new Date(b.data) - new Date(a.data));

  const tabela = document.getElementById('tabela');

  tabela.innerHTML = '';

  dados.slice(0,30).forEach((item,index) => {

    tabela.innerHTML += `
      <tr>
        <td>${item.data}</td>
        <td>${item.procedimentos}</td>
        <td>${item.observacao}</td>
        <td>
          <button onclick="editarRegistro(${index})">Editar</button>
          <button onclick="excluirRegistro(${index})">Excluir</button>
        </td>
      </tr>
    `;

  });
}

function editarRegistro(index){

  const dados = obterDados();

  const item = dados[index];

  document.getElementById('data').value = item.data;

  document.querySelectorAll('input[type="checkbox"]').forEach(c => {
    c.checked = item.procedimentos.includes(c.value);
  });

  document.getElementById('obs').value = item.observacao;

  dados.splice(index,1);

  salvarLocal(dados);

  carregarTabela();
}

function excluirRegistro(index){

  if(!confirm('Deseja excluir este registro?')) return;

  const dados = obterDados();

  dados.splice(index,1);

  salvarLocal(dados);

  carregarTabela();
}

function exportarBackup(){

  const dados = obterDados();

  const blob = new Blob([
    JSON.stringify(dados, null, 2)
  ], {
    type:'application/json'
  });

  const link = document.createElement('a');

  link.href = URL.createObjectURL(blob);
  link.download = 'backup_escala_hcufpe.json';
  link.click();
}

function importarBackup(event){

  const arquivo = event.target.files[0];

  if(!arquivo) return;

  const reader = new FileReader();

  reader.onload = function(e){

    const dados = JSON.parse(e.target.result);

    salvarLocal(dados);

    carregarTabela();

    alert('Backup restaurado com sucesso.');
  }

  reader.readAsText(arquivo);
}

function exportarPDF(){
  window.print();
}

carregarTabela();

</script>

</body>
</html>
